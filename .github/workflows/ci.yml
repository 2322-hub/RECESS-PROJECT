name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff mypy
      - name: Lint with ruff
        run: ruff check .
      - name: Check formatting
        run: ruff format --check .

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt
      - name: Run tests
        run: pytest --cov=bi_platform --cov-report=xml -v
      - name: Upload coverage
        if: matrix.python-version == '3.12'
        uses: codecov/codecov-action@v4
        with:
          file: coverage.xml
          fail_ci_if_error: false

  docker:
    runs-on: ubuntu-latest
    needs: [lint, test]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t bi-platform:${{ github.sha }} .
      - name: Test container starts
        run: |
          docker run -d --name test -p 5000:5000 \
            -e SECRET_KEY=testkey123 \
            -e FLASK_DEBUG=false \
            bi-platform:${{ github.sha }}
          for i in $(seq 1 30); do
            if curl -sf http://localhost:5000/login > /dev/null 2>&1; then
              echo "Container is ready after ${i}s"
              break
            fi
            if [ "$i" -eq 30 ]; then
              echo "Container failed to start within 30s"
              docker logs test
              exit 1
            fi
            sleep 1
          done
          docker stop test
