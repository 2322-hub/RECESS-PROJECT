<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline';" />
  <title>BI Platform — Login</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/dashboard.css') }}" />
  <style>
    html, body { height: 100%; }
    body { display: block; min-height: 100vh; background: linear-gradient(180deg, #040616 0%, #0f172a 100%); }

    .login-wrapper {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 100vh;
      padding: 1.5rem;
      margin: 0;
    }

    .login-card {
      width: 100%;
      max-width: 420px;
      margin: auto;
      background: rgba(15, 23, 42, 0.98);
      border: 1px solid rgba(148, 163, 184, 0.16);
      border-radius: 28px;
      box-shadow: 0 32px 80px rgba(0, 0, 0, 0.35);
      padding: 2.5rem;
    }

    .brand-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0.5rem 1rem;
      border-radius: 999px;
      background: rgba(56, 189, 248, 0.16);
      color: #38bdf8;
      font-size: 0.85rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 1.5rem;
    }

    .login-card h2 {
      font-size: 2rem;
      margin-bottom: 0.5rem;
      color: #f8fafc;
    }

    .login-subtitle {
      color: rgba(226, 232, 240, 0.8);
      line-height: 1.7;
      margin-bottom: 1.7rem;
    }

    .input-group {
      display: grid;
      gap: 0.6rem;
      margin-bottom: 1rem;
    }

    .input-group label {
      color: rgba(148, 163, 184, 0.9);
      font-size: 0.9rem;
    }

    .input-group input {
      width: 100%;
      padding: 1rem 1.1rem;
      border-radius: 16px;
      border: 1px solid rgba(71, 85, 105, 0.2);
      background: rgba(15, 23, 42, 0.86);
      color: var(--text);
      font-size: 0.95rem;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }

    .input-group input::placeholder {
      color: rgba(148, 163, 184, 0.6);
    }

    .input-group input:focus {
      outline: none;
      border-color: rgba(59, 130, 246, 0.8);
      box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.12);
    }

    .btn-block {
      width: 100%;
      margin-top: 1.25rem;
      padding: 1rem;
      border-radius: 18px;
      font-size: 1rem;
      letter-spacing: 0.02em;
    }

    .login-error {
      background: rgba(248, 113, 113, 0.14);
      border: 1px solid rgba(248, 113, 113, 0.24);
      color: #fee2e2;
      padding: 1rem 1rem;
      border-radius: 16px;
      margin-bottom: 1.2rem;
      font-size: 0.95rem;
    }

    .login-footer {
      margin-top: 1.6rem;
      color: rgba(148, 163, 184, 0.88);
      font-size: 0.95rem;
      text-align: center;
    }

    .login-footer a {
      color: var(--accent);
      font-weight: 600;
    }

    @media (max-width: 640px) {
      .login-card {
        padding: 1.8rem;
        border-radius: 22px;
      }
    }
  </style>
</head>
<body>
  <div class="login-wrapper" role="main">
    <div class="login-card">
      <div class="brand-badge">BI Platform</div>
      <h2>Sign in to your account</h2>
      <p class="login-subtitle">Access your dashboards and analytics securely.</p>
      {% if error %}
      <div class="login-error" role="alert">{{ error }}</div>
      {% endif %}
      <form method="POST" action="{{ url_for('auth.login') }}" aria-label="Login form">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}" />
        <div class="input-group">
          <label for="username">Username</label>
          <input type="text" id="username" name="username" required autofocus autocomplete="username" aria-required="true" placeholder="Enter your username" />
        </div>
        <div class="input-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" required autocomplete="current-password" aria-required="true" placeholder="Enter your password" />
        </div>
        <button type="submit" class="btn btn-accent btn-block">Sign In</button>
      </form>
      <div class="login-footer">
        Don’t have an account? <a href="{{ url_for('auth.register_page') }}">Sign Up</a>
      </div>
    </div>
  </div>
</body>
</html>
