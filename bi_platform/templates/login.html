<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline';" />
  <title>BI Platform — Login</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/dashboard.css') }}" />
  <style>
    .login-wrapper { display:flex; align-items:center; justify-content:center; min-height:100vh; padding:1rem; }
    .login-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:2.5rem; width:100%; max-width:400px; }
    .login-card h2 { text-align:center; margin-bottom:1.5rem; }
    .login-card label { display:block; margin-bottom:1rem; font-size:.85rem; color:var(--text-muted); }
    .login-card input { display:block; width:100%; margin-top:.3rem; padding:.6rem .8rem; border-radius:var(--radius); border:1px solid var(--border); background:var(--surface-2); color:var(--text); font-size:.9rem; }
    .login-card .btn { width:100%; margin-top:.5rem; padding:.6rem; font-size:.95rem; }
    .login-error { background:rgba(239,68,68,.15); border:1px solid var(--red); color:var(--red); padding:.6rem; border-radius:var(--radius); margin-bottom:1rem; font-size:.85rem; text-align:center; }
    .login-footer { text-align:center; margin-top:1rem; font-size:.8rem; color:var(--text-muted); }
    .login-footer a { color:var(--accent); }
  </style>
</head>
<body>
  <div class="login-wrapper" role="main">
    <div class="login-card">
      <h2>BI Platform</h2>
      {% if error %}
      <div class="login-error" role="alert">{{ error }}</div>
      {% endif %}
      <form method="POST" action="{{ url_for('auth.login') }}" aria-label="Login form">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}" />
        <label for="username">Username
          <input type="text" id="username" name="username" required autofocus autocomplete="username" aria-required="true" />
        </label>
        <label for="password">Password
          <input type="password" id="password" name="password" required autocomplete="current-password" aria-required="true" />
        </label>
        <button type="submit" class="btn btn-accent">Sign In</button>
      </form>
      <div class="login-footer">
        Don't have an account? <a href="{{ url_for('auth.register_page') }}">Sign Up</a>
      </div>
    </div>
  </div>
</body>
</html>
