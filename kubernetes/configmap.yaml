apiVersion: v1
kind: ConfigMap
metadata:
  name: bi-platform-config
data:
  FLASK_DEBUG: "false"
  SQL_READ_ONLY: "true"
  CORS_ORIGINS: "https://yourdomain.com"
  RATELIMIT_DEFAULT: "60/minute"
  RATELIMIT_STORAGE_URI: "redis://redis:6379/0"
  REDIS_URL: "redis://redis:6379/0"
  LOG_FORMAT: "json"
  LOG_LEVEL: "INFO"
  DB_POOL_SIZE: "5"
  DB_POOL_MAX_OVERFLOW: "10"
  REALTIME_INTERVAL: "5"
